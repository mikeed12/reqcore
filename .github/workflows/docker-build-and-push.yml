name: Docker Build and Push

on:
  push:
    branches:
      - develop
      - production
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: vars
        run: |
          if [ "${GITHUB_REF_NAME}" = "production" ]; then
            echo "TAG=latest" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
            echo "TAG=develop" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        run: echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: docker build . -t ghcr.io/mikeed12/reqcore:${TAG}

      - name: Push image
        run: docker push ghcr.io/mikeed12/reqcore:${TAG}